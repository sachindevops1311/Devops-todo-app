services:
  flask-app:
    build: .
    container_name: flask-app
    ports:
      - "5000:5000"
    environment:
      - DEBUG=False
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=tododb
      - DB_USER=todouser
      - DB_PASSWORD=todopassword
      - REDIS_HOST=redis-cache
      - REDIS_PORT=6379
    depends_on:
      - postgres-db
      - redis-cache
    networks:
      - todo-network

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      - POSTGRES_DB=tododb
      - POSTGRES_USER=todouser
      - POSTGRES_PASSWORD=todopassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - todo-network

  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  postgres-data:
